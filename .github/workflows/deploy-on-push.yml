name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-on-push.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Detect changed apps
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^apps/' | cut -d/ -f2 | sort -u | tr '\n' ' ' | xargs)
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Apps changed: ${CHANGED:-none}"

      - name: Deploy changed apps
        if: steps.detect.outputs.changed != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          for app in ${{ steps.detect.outputs.changed }}; do
            APP_DIR="apps/$app"

            if [ ! -d "$APP_DIR/.vercel" ]; then
              echo "Skipping $app — not linked to Vercel (no .vercel/project.json)"
              continue
            fi

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Deploying: $app"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            cd "$APP_DIR"

            # Pull production env vars and project settings
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

            # Build on the Actions runner (free)
            # VERCEL_INSTALL_COMPLETED=1  — skip vercel's install step (we ran pnpm install above)
            # ALLOW_VERCEL_BUILD=1        — satisfies the guard in vercel.json (blocks Vercel cloud)
            VERCEL_INSTALL_COMPLETED=1 ALLOW_VERCEL_BUILD=1 vercel build --prod --token="$VERCEL_TOKEN"

            # Upload prebuilt output — Vercel cloud does not run any build
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

            cd ../..
          done
